name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker Tag and Secrets
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=main" >> $GITHUB_OUTPUT
            echo "vite_api_url=${{ secrets.VITE_API_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "vite_api_base_url=${{ secrets.VITE_API_BASE_URL_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "vite_api_url=${{ secrets.VITE_API_URL_DEV }}" >> $GITHUB_OUTPUT
            echo "vite_api_base_url=${{ secrets.VITE_API_BASE_URL_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_API_URL=${{ steps.meta.outputs.vite_api_url }}
            VITE_API_BASE_URL=${{ steps.meta.outputs.vite_api_base_url }}

      - name: Trigger Deploy Agent Webhook
        run: |
          PAYLOAD="{\"ref\":\"$GITHUB_REF\",\"repository\":{\"full_name\":\"$GITHUB_REPOSITORY\"}}"
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -binary | od -An -v -tx1 | tr -d ' \n')
          
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" \
            ${{ secrets.DEPLOY_AGENT_URL }}
