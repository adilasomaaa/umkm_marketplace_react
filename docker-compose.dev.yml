services:
  umkm-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api-dev-inbiz.azhr.cloud/api/
        - VITE_API_BASE_URL=https://api-dev-inbiz.azhr.cloud/
    container_name: umkm-frontend-dev
    restart: always
    networks:
      - proxy_network
    ports:
      - "8082:80"

networks:
  proxy_network:
    external: true
